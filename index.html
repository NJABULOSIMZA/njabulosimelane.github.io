<!-- Live Weather Widget - 2026 Interactive Feature -->
<section class="weather-widget">
    <div class="container">
        <h2 class="section-title">
            Live Weather 
            <span class="section-badge">Interactive</span>
        </h2>
        
        <div class="weather-container">
            <!-- Weather Search -->
            <div class="weather-search">
                <input type="text" id="cityInput" placeholder="Enter city name (e.g., Johannesburg)" value="Johannesburg">
                <button id="getWeatherBtn" class="btn btn-primary">
                    <i class="fas fa-search"></i> Get Weather
                </button>
                <button id="currentLocationBtn" class="btn btn-secondary">
                    <i class="fas fa-location-dot"></i> My Location
                </button>
            </div>
            
            <!-- Weather Display Card -->
            <div class="weather-card" id="weatherCard" style="display: none;">
                <div class="weather-header">
                    <h3 id="cityName">Johannesburg</h3>
                    <p id="localTime" class="local-time"></p>
                </div>
                
                <div class="weather-main">
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="Weather icon">
                        <span id="weatherDesc" class="weather-desc"></span>
                    </div>
                    <div class="weather-temp">
                        <span id="temperature"></span>
                        <span class="temp-unit">°C</span>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="weather-detail-item">
                        <i class="fas fa-droplet"></i>
                        <span>Humidity</span>
                        <strong id="humidity"></strong>
                    </div>
                    <div class="weather-detail-item">
                        <i class="fas fa-wind"></i>
                        <span>Wind Speed</span>
                        <strong id="windSpeed"></strong>
                    </div>
                    <div class="weather-detail-item">
                        <i class="fas fa-temperature-low"></i>
                        <span>Feels Like</span>
                        <strong id="feelsLike"></strong>
                    </div>
                    <div class="weather-detail-item">
                        <i class="fas fa-compress"></i>
                        <span>Pressure</span>
                        <strong id="pressure"></strong>
                    </div>
                </div>
                
                <!-- Loading Indicator -->
                <div class="weather-loading" id="weatherLoading">
                    <i class="fas fa-spinner fa-spin"></i> Fetching weather data...
                </div>
                
                <!-- Error Message -->
                <div class="weather-error" id="weatherError">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="errorMessage"></span>
                </div>
            </div>
        </div>
    </div>
</section>
